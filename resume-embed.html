<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Resume PDF Embed</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #181c1b;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #pdf-embed {
      width: 100vw;
      height: 100vh;
      border: none;
      background: #181c1b;
      display: block;
    }
  </style>
</head>
<body>
  <embed id="pdf-embed" src="resume.pdf" type="application/pdf" />
</body>
</html>
